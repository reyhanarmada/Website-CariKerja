version: '3.8'

services:
  db:
    platform: linux/amd64
    image: postgres:15-alpine
    container_name: jobstreet_db_container
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d postgres" ]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - jobstreet_network

  auth-service:
    platform: linux/amd64
    build: ./backend/auth-service
    container_name: jobstreet_auth_service_container
    restart: always
    ports:
      - "4001:4001"
    environment:
      - PORT=4001
      - DB_HOST=db
      - DB_PORT=5432
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - DB_NAME=auth_db
      - JWT_SECRET=supersecretkey
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "node", "-e", "fetch('http://127.0.0.1:4001/health').then(res => res.ok ? process.exit(0) : process.exit(1)).catch(() => process.exit(1))" ]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - jobstreet_network

  job-service:
    platform: linux/amd64
    build: ./backend/job-service
    container_name: jobstreet_job_service_container
    restart: always
    ports:
      - "4002:4002"
    environment:
      - PORT=4002
      - DB_HOST=db
      - DB_PORT=5432
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - DB_NAME=jobs_db
      - JWT_SECRET=supersecretkey
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "node", "-e", "fetch('http://127.0.0.1:4002/health').then(res => res.ok ? process.exit(0) : process.exit(1)).catch(() => process.exit(1))" ]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - jobstreet_network

  application-service:
    platform: linux/amd64
    build: ./backend/application-service
    container_name: jobstreet_application_service_container
    restart: always
    ports:
      - "4003:4003"
    environment:
      - PORT=4003
      - DB_HOST=db
      - DB_PORT=5432
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - DB_NAME=applications_db
      - JWT_SECRET=supersecretkey
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "node", "-e", "fetch('http://127.0.0.1:4003/health').then(res => res.ok ? process.exit(0) : process.exit(1)).catch(() => process.exit(1))" ]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - jobstreet_network

  profile-service:
    platform: linux/amd64
    build: ./backend/profile-service
    container_name: jobstreet_profile_service_container
    restart: always
    ports:
      - "4004:4004"
    environment:
      - PORT=4004
      - DB_HOST=db
      - DB_PORT=5432
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - DB_NAME=profiles_db
      - JWT_SECRET=supersecretkey
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "node", "-e", "fetch('http://127.0.0.1:4004/health').then(res => res.ok ? process.exit(0) : process.exit(1)).catch(() => process.exit(1))" ]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - jobstreet_network

  company-service:
    platform: linux/amd64
    build: ./backend/company-service
    container_name: jobstreet_company_service_container
    restart: always
    ports:
      - "4005:4005"
    environment:
      - PORT=4005
      - DB_HOST=db
      - DB_PORT=5432
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - DB_NAME=companies_db
      - JWT_SECRET=supersecretkey
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "node", "-e", "fetch('http://127.0.0.1:4005/health').then(res => res.ok ? process.exit(0) : process.exit(1)).catch(() => process.exit(1))" ]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - jobstreet_network

  interview-service:
    platform: linux/amd64
    build: ./backend/interview-service
    container_name: jobstreet_interview_service_container
    restart: always
    ports:
      - "4006:4006"
    environment:
      - PORT=4006
      - DB_HOST=db
      - DB_PORT=5432
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - DB_NAME=interviews_db
      - JWT_SECRET=supersecretkey
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "node", "-e", "fetch('http://127.0.0.1:4006/health').then(res => res.ok ? process.exit(0) : process.exit(1)).catch(() => process.exit(1))" ]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - jobstreet_network

  api-gateway:
    platform: linux/amd64
    build: ./backend/api-gateway
    container_name: jobstreet_api_gateway_container
    restart: always
    ports:
      - "4000:4000"
    environment:
      - PORT=4000
      - AUTH_SERVICE_URL=http://auth-service:4001/graphql
      - JOB_SERVICE_URL=http://job-service:4002/graphql
      - APPLICATION_SERVICE_URL=http://application-service:4003/graphql
      - PROFILE_SERVICE_URL=http://profile-service:4004/graphql
      - COMPANY_SERVICE_URL=http://company-service:4005/graphql
      - INTERVIEW_SERVICE_URL=http://interview-service:4006/graphql
    depends_on:
      auth-service:
        condition: service_healthy
      job-service:
        condition: service_healthy
      application-service:
        condition: service_healthy
      profile-service:
        condition: service_healthy
      company-service:
        condition: service_healthy
      interview-service:
        condition: service_healthy
    networks:
      - jobstreet_network

  pgadmin:
    platform: linux/amd64
    image: dpage/pgadmin4
    container_name: jobstreet_pgadmin_container
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - jobstreet_network

volumes:
  postgres_data:

networks:
  jobstreet_network:
    driver: bridge
